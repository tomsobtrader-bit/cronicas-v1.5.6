<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crónicas del Abismo</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

    :root {
        --bg: #080810;
        --bg2: #0f0f1a;
        --bg3: #181825;
        --border: #252535;
        --border-glow: #3a2a5a;
        --gold: #c9a84c;
        --gold-dark: #6a4e1a;
        --red: #c0392b;
        --red-bright: #e74c3c;
        --green: #27ae60;
        --blue: #2980b9;
        --purple: #8e44ad;
        --text: #e8e0d0;
        --text-dim: #666;
        --selected: #f39c12;
        --attackable: #e74c3c;
        --healable: #27ae60;
        --placeable: #3498db;
        --spell-target: #9b59b6;
        --sacrifice: #e74c3c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%; height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Crimson Text', Georgia, serif;
        overflow: hidden;
    }

    /* ══════════════════════════════════════
       PANTALLA DE INICIO
    ══════════════════════════════════════ */
    #start-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 24px;
        background: radial-gradient(ellipse at center, #1a0a2a 0%, #080810 70%);
        z-index: 200;
    }
    #start-screen h1 {
        font-family: 'Cinzel', serif;
        font-size: clamp(2rem, 4vw, 3.5rem);
        font-weight: 900;
        letter-spacing: 0.15em;
        color: var(--gold);
        text-shadow: 0 0 40px rgba(201,168,76,0.5);
    }
    #start-screen p {
        color: var(--text-dim);
        font-size: 1.1rem;
        letter-spacing: 0.08em;
    }
    .btn-start {
        font-family: 'Cinzel', serif;
        font-size: 1.1rem;
        letter-spacing: 0.12em;
        background: linear-gradient(135deg, #4a1a6a, #2a0a3a);
        color: var(--gold);
        border: 1px solid var(--gold-dark);
        padding: 16px 48px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-start:hover {
        background: linear-gradient(135deg, #6a2a9a, #4a1a6a);
        box-shadow: 0 0 30px rgba(201,168,76,0.3);
    }

    /* ══════════════════════════════════════
       BARRA DE PROGRESO DE RUN — compacta
    ══════════════════════════════════════ */
    #run-bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 28px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border-glow);
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 6px;
        z-index: 100;
    }
    .run-title {
        font-family: 'Cinzel', serif;
        font-size: 0.55rem;
        letter-spacing: 0.12em;
        color: var(--gold);
        white-space: nowrap;
        margin-right: 6px;
    }
    .run-steps {
        display: flex;
        align-items: center;
        gap: 2px;
        flex: 1;
    }
    .run-step {
        width: 24px; height: 16px;
        border: 1px solid var(--border);
        background: var(--bg3);
        display: flex; align-items: center; justify-content: center;
        font-size: 0.5rem;
        font-family: 'Cinzel', serif;
        color: var(--text-dim);
        transition: all 0.3s;
        flex-shrink: 0;
    }
    .run-step.step-done    { background: rgba(201,168,76,0.15); border-color: var(--gold-dark); color: var(--gold); }
    .run-step.step-current { background: rgba(201,168,76,0.25); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.4); animation: step-pulse 1.5s infinite alternate; }
    .run-step.step-miniboss { border-color: #e67e22; color: #e67e22; }
    .run-step.step-miniboss.step-current { background: rgba(230,126,34,0.2); box-shadow: 0 0 8px rgba(230,126,34,0.4); }
    .run-step.step-boss { width: 28px; border-color: var(--red-bright); color: var(--red-bright); font-size: 0.65rem; }
    .run-step.step-boss.step-current { background: rgba(231,76,60,0.2); box-shadow: 0 0 12px rgba(231,76,60,0.5); }
    .run-connector { width: 6px; height: 1px; background: var(--border); flex-shrink: 0; }
    .run-connector.done { background: var(--gold-dark); }
    @keyframes step-pulse { from{box-shadow:0 0 4px rgba(201,168,76,0.3)} to{box-shadow:0 0 14px rgba(201,168,76,0.6)} }
    .run-level-label { font-family:'Cinzel',serif; font-size:0.6rem; color:var(--text-dim); white-space:nowrap; margin-left:auto; }
    .run-level-label span { color:var(--gold); }

    /* ══════════════════════════════════════
       LAYOUT PRINCIPAL
    ══════════════════════════════════════ */
    #app {
        width: 100vw; height: 100vh;
        padding-top: 28px;
        display: flex; overflow: hidden;
    }

    .game-wrapper {
        width: 100%; height: 100%;
        display: grid;
        grid-template-columns: 175px 1fr 175px;
    }

    /* ══════════════════════════════════════
       PANELES LATERALES
    ══════════════════════════════════════ */
    .side-panel {
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column;
        overflow: hidden; height: 100%;
    }
    .right-panel { border-right: none; border-left: 1px solid var(--border); }
    .panel-title {
        font-family: 'Cinzel', serif;
        font-size: 0.6rem; letter-spacing: 0.15em;
        color: var(--gold); padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .log-section {
        flex: 1; overflow-y: auto; padding: 5px;
        display: flex; flex-direction: column; gap: 2px;
    }
    .log-line { font-size: 0.68rem; color: var(--text-dim); line-height: 1.35; padding: 2px 3px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-line:first-child { color: var(--text); }
    .log-section::-webkit-scrollbar { width: 3px; }
    .log-section::-webkit-scrollbar-thumb { background: var(--border-glow); }

    .info-content { flex: 1; padding: 7px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
    .info-hint { font-size: 0.72rem; line-height: 1.45; padding: 7px; border-radius: 2px; border: 1px solid var(--border); }
    .info-hint.placing   { border-color: var(--placeable);    background: rgba(52,152,219,0.08); }
    .info-hint.attacking { border-color: var(--attackable);   background: rgba(231,76,60,0.08); }
    .info-hint.heal      { border-color: var(--healable);     background: rgba(39,174,96,0.08);  color: var(--green); }
    .info-hint.spell     { border-color: var(--spell-target); background: rgba(155,89,182,0.08); color: #b39ddb; }
    .info-hint.sacrifice { border-color: var(--sacrifice);    background: rgba(192,57,43,0.1);   color: var(--red-bright); }
    .info-hint.neutral   { border-color: var(--border); }

    /* ══════════════════════════════════════
       CENTRO
    ══════════════════════════════════════ */
    .center-panel {
        display: flex; flex-direction: column;
        height: 100%; overflow: hidden;
        padding: 3px 6px; gap: 2px;
    }

    /* ══════════════════════════════════════
       BARRAS DE LÍDER — más compactas
    ══════════════════════════════════════ */
    .leader-bar {
        display: flex; align-items: center; gap: 7px;
        padding: 3px 8px;
        border: 1px solid var(--border);
        background: var(--bg2);
        font-family: 'Cinzel', serif; font-size: 0.68rem;
        flex-shrink: 0; flex-wrap: wrap;
        min-height: 32px;
    }
    .enemy-bar  { border-color: rgba(192,57,43,0.4); }
    .player-bar { border-color: rgba(41,128,185,0.4); }
    .leader-label { font-weight: 700; letter-spacing: 0.05em; margin-right: 3px; }

    .hp-block { display: flex; align-items: center; gap: 4px; }
    .hp-value { font-size: 0.85rem; font-weight: 700; min-width: 24px; }
    .hp-value.hp-low { color: var(--red-bright); animation: pulse 1s infinite; }
    .hp-bar-wrap { width: 65px; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .hp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .hp-bar-fill.player { background: linear-gradient(90deg, #1a6a3a, #27ae60); }
    .hp-bar-fill.enemy  { background: linear-gradient(90deg, #6a1a1a, #c0392b); }

    .energy-block { display: flex; align-items: center; gap: 3px; }
    .energy-label { font-size: 0.62rem; color: #f1c40f; letter-spacing: 0.04em; }
    .energy-pips  { display: flex; gap: 2px; flex-wrap: wrap; max-width: 72px; }
    .pip { width: 6px; height: 6px; border-radius: 50%; border: 1px solid #f1c40f44; background: transparent; transition: background 0.2s; }
    .pip.filled { background: #f1c40f; box-shadow: 0 0 3px rgba(241,196,15,0.6); }

    .attack-block { display: flex; align-items: center; gap: 3px; }
    .attack-label { font-size: 0.6rem; color: #e67e22; }
    .atk-pips { display: flex; gap: 3px; }
    .atk-pip { font-size: 0.7rem; opacity: 0.2; transition: opacity 0.2s, filter 0.2s; }
    .atk-pip.used { opacity: 1; filter: drop-shadow(0 0 3px #e67e22); }

    .turn-display { color: var(--text-dim); font-size: 0.65rem; margin-left: 3px; }

    /* ── Banner de acción del enemigo ── */
    .enemy-action-banner {
        font-family: 'Cinzel', serif;
        font-size: 0.68rem;
        color: #ffb347;
        background: rgba(255,100,0,0.12);
        border: 1px solid rgba(255,100,0,0.3);
        padding: 3px 10px;
        border-radius: 2px;
        animation: banner-pulse 0.5s infinite alternate;
        margin-left: 4px;
    }
    @keyframes banner-pulse {
        from { background: rgba(255,100,0,0.08); }
        to   { background: rgba(255,100,0,0.2);  }
    }

    /* ══════════════════════════════════════
       BATTLEFIELD — celdas más altas
    ══════════════════════════════════════ */
    .battlefield { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
    .board-row   { display: flex; align-items: center; gap: 3px; }
    .row-label {
        font-family: 'Cinzel', serif;
        font-size: 0.48rem; color: var(--text-dim);
        letter-spacing: 0.06em; width: 32px;
        text-align: right; flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       CELDAS — más grandes (más espacio de tablero)
    ══════════════════════════════════════ */
    .cell {
        flex: 1; height: 112px;
        border: 1px solid var(--border);
        background: var(--bg2);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        cursor: default; transition: all 0.12s;
        position: relative; overflow: hidden; user-select: none;
    }
    .cell-filled { cursor: pointer; }
    .cell-empty  { opacity: 0.32; }

    .cell-player.cell-filled {
        border-color: rgba(41,128,185,0.4);
        background: linear-gradient(180deg, #0c1828 0%, #080f1a 100%);
    }
    .cell-player.cell-filled:hover {
        border-color: var(--blue);
        box-shadow: inset 0 0 14px rgba(41,128,185,0.15);
    }
    .cell-enemy.cell-filled {
        border-color: rgba(192,57,43,0.35);
        background: linear-gradient(180deg, #200c0c 0%, #140707 100%);
    }
    .cell-enemy.cell-filled:hover { border-color: var(--red); }

    /* Estado visual: el enemigo está seleccionando esta tropa */
    .cell-enemy-selecting {
        border-color: #ffb347 !important;
        box-shadow: 0 0 18px rgba(255,179,71,0.55) !important;
        animation: enemy-selecting 0.4s ease-out !important;
    }
    @keyframes enemy-selecting {
        0%   { box-shadow: 0 0 4px rgba(255,179,71,0.2); }
        50%  { box-shadow: 0 0 24px rgba(255,179,71,0.7); }
        100% { box-shadow: 0 0 18px rgba(255,179,71,0.5); }
    }

    .cell-selected   { border-color: var(--selected)    !important; box-shadow: 0 0 18px rgba(243,156,18,0.4)  !important; }
    .cell-attackable { border-color: var(--attackable)  !important; box-shadow: 0 0 14px rgba(231,76,60,0.35)  !important; animation: attackable-pulse 0.8s infinite alternate; cursor: crosshair !important; }
    .cell-healable   { border-color: var(--healable)    !important; box-shadow: 0 0 14px rgba(39,174,96,0.4)   !important; cursor: pointer !important; }
    .cell-placeable  { border-color: var(--placeable)   !important; box-shadow: 0 0 14px rgba(52,152,219,0.35) !important; cursor: cell !important; opacity: 0.9 !important; animation: placeable-pulse 1s infinite alternate; }
    .cell-spell-target      { border-color: var(--spell-target) !important; box-shadow: 0 0 14px rgba(155,89,182,0.4) !important; cursor: pointer !important; }
    .cell-sacrifice         { border-color: #e74c3c !important; box-shadow: 0 0 14px rgba(231,76,60,0.4)   !important; cursor: pointer !important; animation: sacrifice-pulse 0.6s infinite alternate; }
    .cell-sacrifice-enemy   { border-color: #8e44ad !important; box-shadow: 0 0 14px rgba(142,68,173,0.4)   !important; cursor: pointer !important; animation: sacrifice-pulse 0.6s infinite alternate; }

    .cell-anim-attack { animation: anim-attack 0.35s ease-out !important; }
    .cell-anim-hit    { animation: anim-hit    0.4s  ease-out !important; }
    .cell-anim-death  { animation: anim-death  0.5s  ease-out forwards !important; }
    .cell-anim-summon { animation: anim-summon 0.4s  ease-out !important; }

    @keyframes anim-attack {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.12) translateY(-4px); box-shadow: 0 0 20px rgba(243,156,18,0.7) !important; }
        100% { transform: scale(1); }
    }
    @keyframes anim-hit {
        0%   { filter: brightness(1); }
        30%  { filter: brightness(2.5) saturate(0.2); transform: scale(0.95); }
        100% { filter: brightness(1); transform: scale(1); }
    }
    @keyframes anim-death {
        0%   { opacity: 1; transform: scale(1); filter: brightness(1); }
        50%  { opacity: 0.6; transform: scale(1.1); filter: brightness(2) saturate(0); }
        100% { opacity: 0; transform: scale(0.7) rotate(8deg); filter: brightness(0); }
    }
    @keyframes anim-summon {
        0%   { opacity: 0; transform: scale(0.6) translateY(10px); }
        70%  { transform: scale(1.05) translateY(-2px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes pulse            { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes attackable-pulse { from{box-shadow:0 0 8px rgba(231,76,60,0.2)} to{box-shadow:0 0 22px rgba(231,76,60,0.55)} }
    @keyframes placeable-pulse  { from{box-shadow:0 0 8px rgba(52,152,219,0.2)} to{box-shadow:0 0 22px rgba(52,152,219,0.5)} }
    @keyframes sacrifice-pulse  { from{opacity:0.7} to{opacity:1} }

    /* ── TROPA EN CELDA ── */
    .troop-img {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover; opacity: 0.45; pointer-events: none;
    }
    .troop-overlay {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        align-items: center; width: 100%; padding: 2px 3px;
    }
    .troop-name {
        font-family: 'Cinzel', serif;
        font-size: 0.54rem; font-weight: 700;
        letter-spacing: 0.02em; text-align: center;
        line-height: 1.2; color: #fff;
        text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8);
        padding: 0 2px;
    }
    .troop-stats { display: flex; gap: 7px; font-size: 0.95rem; margin-top: 4px; }
    .atk { color: #f39c12; font-weight: 700; text-shadow: 0 0 6px rgba(0,0,0,0.9); }
    .hp  { color: #e74c3c; font-weight: 700; text-shadow: 0 0 6px rgba(0,0,0,0.9); }
    .hp-crit { color: #ff4444; animation: pulse 0.5s infinite; }

    .troop-tags { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 3px; }
    .tag        { font-size: 0.6rem; padding: 0 2px; border-radius: 2px; line-height: 1.4; }
    .tag-fatigue { color: #aaa; }
    .tag-stun   { color: #f1c40f; filter: drop-shadow(0 0 3px #f1c40f); animation: stun-pulse 0.6s infinite alternate; }
    .tag-poison { color: #2ecc71; }
    .tag-burn   { color: #e67e22; }
    .tag-curse  { color: #9b59b6; }
    .tag-mark   { color: #e74c3c; }
    .tag-used   { color: #555; }
    .tag-attacked { color: #555; font-size: 0.55rem; opacity: 0.5; }

    @keyframes stun-pulse { from{opacity:0.7;filter:drop-shadow(0 0 2px #f1c40f)} to{opacity:1;filter:drop-shadow(0 0 6px #f1c40f)} }

    .cell-placeholder  { color: var(--border); font-size: 1rem; }
    .placeable-hint    { color: var(--placeable); font-size: 1.4rem; opacity: 0.7; }

    /* ══════════════════════════════════════
       DIVISOR
    ══════════════════════════════════════ */
    .divider {
        display: flex; align-items: center; justify-content: center;
        padding: 2px 0; gap: 10px; flex-shrink: 0;
    }
    .divider::before, .divider::after {
        content: ""; flex: 1; height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    }
    .btn-leader {
        font-family: 'Cinzel', serif;
        font-size: 0.6rem; letter-spacing: 0.08em;
        background: var(--bg3); color: var(--text-dim);
        border: 1px solid var(--border);
        padding: 3px 10px; cursor: pointer;
        transition: all 0.15s; white-space: nowrap;
    }
    .btn-leader.btn-active {
        color: var(--gold); border-color: var(--gold-dark);
        box-shadow: 0 0 12px rgba(201,168,76,0.2);
        animation: leader-pulse 0.9s infinite alternate;
    }
    .btn-leader.btn-active:hover { background: rgba(201,168,76,0.1); }
    @keyframes leader-pulse {
        from { box-shadow: 0 0 6px rgba(201,168,76,0.15); }
        to   { box-shadow: 0 0 18px rgba(201,168,76,0.45); }
    }

    /* ══════════════════════════════════════
       MANO DE CARTAS — más grandes
    ══════════════════════════════════════ */
    .hand-section {
        flex: 1; display: flex; flex-direction: column;
        min-height: 0; overflow: hidden; margin-top: 2px;
    }
    .hand-label {
        font-family: 'Cinzel', serif;
        font-size: 0.55rem; color: var(--text-dim);
        letter-spacing: 0.1em; margin-bottom: 3px; flex-shrink: 0;
    }
    .hand {
        display: flex; gap: 5px;
        overflow-x: auto; padding-bottom: 4px;
        flex: 1; align-items: flex-start;
        justify-content: center;
    }
    .hand::-webkit-scrollbar { height: 3px; }
    .hand::-webkit-scrollbar-thumb { background: var(--border-glow); }

    /* ── CARTA DE MANO ── */
    .hand-card {
        width: 108px; min-width: 108px;
        height: 155px;
        border: 1px solid var(--border);
        background: var(--bg3);
        display: flex; flex-direction: column;
        cursor: pointer; transition: all 0.15s;
        position: relative; flex-shrink: 0; overflow: hidden;
    }
    .card-img-wrap {
        width: 100%; height: 80px;
        overflow: hidden; flex-shrink: 0; position: relative;
    }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-cost-badge {
        position: absolute; top: 3px; left: 3px;
        background: rgba(0,0,0,0.82);
        border: 1px solid #f1c40f55;
        color: #f1c40f;
        font-family: 'Cinzel', serif;
        font-size: 0.82rem; font-weight: 700;
        width: 22px; height: 22px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 2px;
    }
    .card-body {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; padding: 4px 4px 3px;
        background: linear-gradient(180deg, var(--bg3), #0d0d18);
    }
    .card-name {
        font-family: 'Cinzel', serif;
        font-size: 0.54rem; font-weight: 700;
        text-align: center; line-height: 1.25;
        color: var(--text); margin-bottom: 2px;
    }
    .card-type {
        font-size: 0.5rem; color: var(--text-dim);
        letter-spacing: 0.03em; text-transform: uppercase; margin-bottom: auto;
    }
    .card-stats { display: flex; gap: 8px; font-size: 0.85rem; margin-top: 3px; }
    .card-stats span:first-child { color: #e67e22; font-weight: 700; }
    .card-stats span:last-child  { color: #e74c3c; font-weight: 700; }
    .card-spell-icon { font-size: 1.4rem; margin-top: auto; opacity: 0.8; }

    .card-img-placeholder {
        width: 100%; height: 80px;
        background: linear-gradient(135deg, #1a0a2a, #0a0a18);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.7rem; opacity: 0.5; flex-shrink: 0;
    }

    .card-playable     { border-color: rgba(41,128,185,0.5); }
    .card-playable:hover { transform: translateY(-14px); border-color: var(--gold); box-shadow: 0 14px 30px rgba(0,0,0,0.8); }
    .card-unaffordable { opacity: 0.38; cursor: not-allowed; }
    .card-selected     { border-color: var(--gold) !important; box-shadow: 0 0 22px rgba(201,168,76,0.55) !important; transform: translateY(-16px) !important; }
    .card-spell        { border-color: rgba(155,89,182,0.5) !important; }
    .card-spell.card-playable:hover  { border-color: #9b59b6 !important; }
    .card-spell.card-selected        { border-color: #9b59b6 !important; box-shadow: 0 0 18px rgba(155,89,182,0.5) !important; }

    /* ══════════════════════════════════════
       BOTÓN FIN DE TURNO
    ══════════════════════════════════════ */
    .btn-end {
        font-family: 'Cinzel', serif;
        font-size: 0.72rem; letter-spacing: 0.08em;
        background: linear-gradient(135deg, #1a3a5a, #0d2040);
        color: var(--gold); border: 1px solid var(--gold-dark);
        padding: 5px 14px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-end:hover { background: linear-gradient(135deg, #2a5a8a, #1a3a6a); box-shadow: 0 0 16px rgba(201,168,76,0.2); }
    .enemy-turn-label { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--red-bright); letter-spacing: 0.05em; animation: pulse 1s infinite; }

    /* ══════════════════════════════════════
       PREVIEW MODAL
    ══════════════════════════════════════ */
    .preview-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex; align-items: center; justify-content: center;
        z-index: 150; backdrop-filter: blur(3px);
    }
    .preview-modal {
        background: var(--bg2);
        border: 1px solid var(--gold-dark);
        min-width: 240px; max-width: 295px;
        display: flex; flex-direction: column;
        align-items: center; gap: 10px;
        box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(201,168,76,0.1);
        overflow: hidden;
    }
    .preview-card-img { width: 100%; height: 155px; object-fit: cover; display: block; }
    .preview-card-img-placeholder {
        width: 100%; height: 95px;
        background: linear-gradient(135deg, #1a0a2a, #0a0a18);
        display: flex; align-items: center; justify-content: center;
        font-size: 3rem; opacity: 0.4;
    }
    .preview-body { padding: 0 18px 18px; display: flex; flex-direction: column; align-items: center; gap: 7px; width: 100%; }
    .preview-cost   { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; color: #f1c40f; align-self: flex-start; }
    .preview-name   { font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 900; color: var(--gold); text-align: center; letter-spacing: 0.05em; }
    .preview-type   { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
    .preview-stats  { display: flex; gap: 20px; font-size: 1rem; font-weight: 700; }
    .preview-atk    { color: #e67e22; }
    .preview-hp     { color: #e74c3c; }
    .preview-effect { font-size: 0.82rem; color: var(--text); text-align: center; line-height: 1.55; border-top: 1px solid var(--border); padding-top: 9px; font-style: italic; width: 100%; }
    .preview-close  { font-family: 'Cinzel', serif; font-size: 0.7rem; background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); padding: 5px 16px; cursor: pointer; transition: all 0.15s; }
    .preview-close:hover { border-color: var(--gold-dark); color: var(--gold); }

    /* ══════════════════════════════════════
       GAME OVER / VICTORIA
    ══════════════════════════════════════ */
    .game-over-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.88);
        display: flex; align-items: center; justify-content: center;
        z-index: 200;
    }
    .game-over-box {
        background: var(--bg2);
        border: 1px solid var(--gold-dark);
        padding: 40px 70px;
        display: flex; flex-direction: column;
        align-items: center; gap: 18px;
        box-shadow: 0 0 80px rgba(0,0,0,0.9);
    }
    .game-over-title {
        font-family: 'Cinzel', serif;
        font-size: 2rem; font-weight: 900;
        color: var(--gold); letter-spacing: 0.1em;
    }
    .game-over-subtitle {
        font-family: 'Cinzel', serif;
        font-size: 0.85rem; color: var(--text-dim);
        letter-spacing: 0.08em;
    }
    .btn-restart {
        font-family: 'Cinzel', serif; font-size: 0.88rem;
        letter-spacing: 0.08em;
        background: linear-gradient(135deg, #4a1a6a, #2a0a3a);
        color: var(--gold); border: 1px solid var(--gold-dark);
        padding: 11px 32px; cursor: pointer; transition: all 0.15s;
    }
    .btn-restart:hover { opacity: 0.8; box-shadow: 0 0 20px rgba(201,168,76,0.2); }
    .btn-next-level {
        background: linear-gradient(135deg, #1a4a2a, #0a2a15) !important;
        border-color: #27ae60 !important;
        color: #2ecc71 !important;
        font-size: 1rem !important;
        padding: 14px 40px !important;
    }
    .btn-next-level:hover { box-shadow: 0 0 20px rgba(39,174,96,0.3) !important; }
</style>
</head>
<body>

<!-- BARRA DE PROGRESO DE RUN -->
<div id="run-bar">
    <div class="run-title">RUN</div>
    <div class="run-steps" id="run-steps"></div>
    <div class="run-level-label">Nivel <span id="run-level-num">1</span> / 10</div>
</div>

<!-- PANTALLA DE INICIO -->
<div id="start-screen">
    <h1>Crónicas del Abismo</h1>
    <p>Roguelike de cartas estratégico</p>
    <button class="btn-start" id="start">⚔ Iniciar Combate</button>
</div>

<div id="app"></div>

<script type="module">
    import { Game } from "./game.js"

    const game = new Game()
    window.game = game

    // ── Barra de progreso de run ──────────────────
    const STEP_CONFIG = [
        { n:1,  icon:"1",  type:"normal"  },
        { n:2,  icon:"2",  type:"normal"  },
        { n:3,  icon:"3",  type:"normal"  },
        { n:4,  icon:"👹", type:"miniboss"},
        { n:5,  icon:"5",  type:"normal"  },
        { n:6,  icon:"6",  type:"normal"  },
        { n:7,  icon:"7",  type:"normal"  },
        { n:8,  icon:"👹", type:"miniboss"},
        { n:9,  icon:"9",  type:"normal"  },
        { n:10, icon:"💀", type:"boss"    },
    ]

    function renderRunBar(currentLevel) {
        const container = document.getElementById("run-steps")
        const numEl = document.getElementById("run-level-num")
        if (!container) return
        numEl.textContent = currentLevel
        let html = ""
        STEP_CONFIG.forEach((step, i) => {
            const isDone    = step.n < currentLevel
            const isCurrent = step.n === currentLevel
            let cls = `run-step step-${step.type}`
            if (isDone)    cls += " step-done"
            if (isCurrent) cls += " step-current"
            html += `<div class="${cls}" title="${
                step.type === "miniboss" ? "Mini Jefe" :
                step.type === "boss"     ? "¡JEFE FINAL!" : "Nivel " + step.n
            }">${isDone ? "✓" : step.icon}</div>`
            if (i < STEP_CONFIG.length - 1) {
                html += `<div class="run-connector${isDone ? " done" : ""}"></div>`
            }
        })
        container.innerHTML = html
    }

    window._updateRunBar = renderRunBar
    renderRunBar(game.runManager?.level || 1)
    setInterval(() => {
        const lvl = game.runManager?.level || 1
        renderRunBar(lvl)
    }, 800)

    // ── Inicio ────────────────────────────────────
    document.getElementById("start").onclick = () => {
        document.getElementById("start-screen").style.display = "none"

        // Nivel 1: enemigo con 5 HP
        game.combatSystem.enemyHealth = 5
        game.combatSystem.startCombat()
    }
</script>

</body>
</html>
